<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Reader</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --surface: #ffffff;
            --primary: #0071e3;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #f5f5f7;
                --surface: #1c1c1e;
                --primary: #0a84ff;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 16px;
            line-height: 1.6;
        }

        .toolbar {
            position: sticky;
            top: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        button {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="toolbar">
        <button id="copy-btn">Copy Text</button>
        <button id="download-btn">Save .txt File</button>
    </div>
    <div id="content" class="container">Loading content...</div>
    <div id="toast" class="toast">Copied!</div>
    <script src="viewer.js"></script>
</body>

</html>
